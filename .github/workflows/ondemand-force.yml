name: Generate Readme (On Demand, Force)

on: workflow_dispatch

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  main:
    name: Generate Readme (On Demand, Force)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Raycast Extensions
        run: |
          chmod +x ./clone_raycast_sparse.sh
          ./clone_raycast_sparse.sh --repo https://github.com/raycast/extensions.git

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4

      - name: Generate Readme
        run: deno task run --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Readme (On Demand, Force)
          commit_options: "--no-verify"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare data directory for Pages
        run: |
          # Create a directory structure that will be served by GitHub Pages
          mkdir -p _site/data
          mkdir -p _site/types
          mkdir -p _site/graphs
          cp data/data.json _site/data/
          cp data/history.json _site/data/
          cp data/api-versions.json _site/data/
          cp graphs/*.svg _site/graphs/ 2>/dev/null || true

          # Copy and customize the index.html
          cp assets/index.html _site/index.html
          GRAPH_SEED=$(cat graphs/.seed)
          sed -i.bak "s|{{GITHUB_REPOSITORY}}|${{ github.repository }}|g" _site/index.html
          sed -i.bak "s|{{GRAPH_SEED}}|${GRAPH_SEED}|g" _site/index.html
          rm _site/index.html.bak

          # Copy types
          cp scripts/types/external.ts _site/types/types.d.ts

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
