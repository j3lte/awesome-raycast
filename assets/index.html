<!DOCTYPE html>
<html>

<head>
  <title>Awesome Raycast Data</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      color: #111827;
    }

    h1 {
      color: #111827;
      margin-bottom: 4px;
    }

    h2 {
      color: #374151;
      margin-top: 40px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    a {
      color: #FF6363;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .subtitle {
      color: #6b7280;
      margin-top: 4px;
    }

    ul {
      line-height: 1.9;
    }

    .graphs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }

    .graphs img {
      width: 100%;
      height: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    .graphs img.wide {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <h1>Awesome Raycast Data</h1>
  <p class="subtitle">Live data from the <a href="https://github.com/{{GITHUB_REPOSITORY}}">{{GITHUB_REPOSITORY}}</a> project.</p>

  <h2>Data files</h2>
  <ul>
    <li><a href="data/data.json"><code>data.json</code></a> — Current extension data</li>
    <li><a href="data/history.json"><code>history.json</code></a> — Historical statistics</li>
    <li><a href="data/api-versions.json"><code>api-versions.json</code></a> — API version statistics</li>
  </ul>

  <h2>Graphs</h2>
  <div class="graphs">
    <img src="graphs/packages-growth-{{GRAPH_SEED}}.svg" alt="Packages Growth Over Time" />
    <img src="graphs/community-growth-{{GRAPH_SEED}}.svg" alt="Community Growth Over Time" />
    <img src="graphs/platform-distribution-{{GRAPH_SEED}}.svg" alt="Platform Distribution" />
    <img src="graphs/api-versions-{{GRAPH_SEED}}.svg" alt="Top API Versions" class="wide" />
  </div>
</body>

</html>
