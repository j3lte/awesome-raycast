<!DOCTYPE html>
<html>

<head>
  <title>Awesome Raycast Data</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary meta -->
  <meta name="description"
    content="Live statistics and growth charts for the Raycast extension ecosystem — packages, authors, contributors, platform distribution and API versions.">
  <meta name="author" content="j3lte">
  <meta name="theme-color" content="#FF6363">
  <link rel="canonical" href="https://j3lte.github.io/awesome-raycast/">
  <link rel="me" href="https://github.com/j3lte">
  <link rel="me" href="https://x.com/j3lte">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Awesome Raycast Data">
  <meta property="og:title" content="Awesome Raycast Data">
  <meta property="og:description"
    content="Live statistics and growth charts for the Raycast extension ecosystem — packages, authors, contributors, platform distribution and API versions.">
  <meta property="og:url" content="https://j3lte.github.io/awesome-raycast/">
  <meta property="og:image" content="https://j3lte.github.io/awesome-raycast/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Awesome Raycast Data — growth charts and statistics">
  <meta property="og:updated_time" content="{{LAST_UPDATE}}">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@j3lte">
  <meta name="twitter:creator" content="@j3lte">
  <meta name="twitter:title" content="Awesome Raycast Data">
  <meta name="twitter:description"
    content="Live statistics and growth charts for the Raycast extension ecosystem — packages, authors, contributors, platform distribution and API versions.">
  <meta name="twitter:image" content="https://j3lte.github.io/awesome-raycast/og-image.png">
  <meta name="twitter:image:alt" content="Awesome Raycast Data — growth charts and statistics">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      color: #111827;
    }

    h1 {
      color: #111827;
      margin-bottom: 4px;
    }

    h2 {
      color: #374151;
      margin-top: 40px;
      margin-bottom: 16px;
      font-size: 18px;
    }

    a {
      color: #FF6363;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .subtitle {
      color: #6b7280;
      margin-top: 4px;
    }

    .update-time {
      text-align: right;
      margin-top: 6px;
    }

    ul {
      line-height: 1.9;
    }

    .graphs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 16px;
    }

    .graphs img {
      width: 100%;
      height: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    .graphs a.wide {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <h1>Awesome Raycast Data</h1>
  <p class="subtitle">Live data from the <a href="https://github.com/{{GITHUB_REPOSITORY}}">{{GITHUB_REPOSITORY}}</a>
    project.</p>
  <p class="update-time"><a href="graphics/update-time-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/update-time-{{GRAPH_SEED}}.svg" alt="Last update" /></a></p>

  <h2>Data files</h2>
  <ul>
    <li><a href="data/data.json"><code>data.json</code></a> — Current extension data</li>
    <li><a href="data/history.json"><code>history.json</code></a> — Historical statistics</li>
    <li><a href="data/api-versions.json"><code>api-versions.json</code></a> — API version statistics</li>
  </ul>

  <h2>Graphs</h2>
  <div class="graphs">
    <a href="graphics/graph-packages-growth-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-packages-growth-{{GRAPH_SEED}}.svg" alt="Packages Growth Over Time" /></a>
    <a href="graphics/graph-community-growth-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-community-growth-{{GRAPH_SEED}}.svg" alt="Community Growth Over Time" /></a>
    <a href="graphics/graph-platform-growth-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-platform-growth-{{GRAPH_SEED}}.svg" alt="Platform Support Over Time" /></a>
    <a href="graphics/graph-platform-distribution-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-platform-distribution-{{GRAPH_SEED}}.svg" alt="Platform Distribution" /></a>
    <a href="graphics/graph-package-freshness-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-package-freshness-{{GRAPH_SEED}}.svg" alt="Package Freshness" /></a>
    <a href="graphics/graph-contributor-distribution-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer"><img src="graphics/graph-contributor-distribution-{{GRAPH_SEED}}.svg" alt="Contributor Distribution" /></a>
    <a href="graphics/graph-quarterly-updates-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer" class="wide"><img src="graphics/graph-quarterly-updates-{{GRAPH_SEED}}.svg" alt="Packages by Last Updated Quarter" /></a>
    <a href="graphics/graph-top-dependencies-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer" class="wide"><img src="graphics/graph-top-dependencies-{{GRAPH_SEED}}.svg" alt="Top Dependencies" /></a>
    <a href="graphics/graph-api-versions-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer" class="wide"><img src="graphics/graph-api-versions-{{GRAPH_SEED}}.svg" alt="Top API Versions" /></a>
    <a href="graphics/graph-api-distribution-{{GRAPH_SEED}}.svg" target="_blank" rel="noopener noreferrer" class="wide"><img src="graphics/graph-api-distribution-{{GRAPH_SEED}}.svg" alt="API Version Distribution" /></a>
  </div>
</body>

</html>
